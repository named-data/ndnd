name: Docker
on:
  push:
    tags:
      - 'v*'
  schedule:
    # twice a month
    - cron: '20 5 5,20 * *'
  workflow_dispatch:

permissions:
  artifact-metadata: write
  attestations: write
  id-token: write
  packages: write

jobs:
  ndnd:
    uses: named-data/actions/.github/workflows/docker-image.yml@v1
    with:
      name: ndnd
